<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Full mobile viewport, disable user scaling (game handles it) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a1a">
  <title>Village Tower Defense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <div id="canvas-wrap">
      <canvas id="game" width="640" height="480"></canvas>
    </div>

    <div id="sidebar">
      <h2 id="game-title">⚔ Village TD</h2>

      <!-- Stats row -->
      <div id="stats">
        <div class="stat"><span class="lbl">Wave</span><span id="wave-num" class="val">0</span></div>
        <div class="stat"><span class="lbl">💰</span><span id="gold" class="val">150</span></div>
        <div class="stat"><span class="lbl">❤</span><span id="lives" class="val">10</span></div>
        <div class="stat"><span class="lbl">Score</span><span id="score" class="val">0</span></div>
        <div class="stat"><span class="lbl">Best</span><span id="best" class="val">0</span></div>
      </div>

      <div class="divider"></div>

      <!-- Classic towers -->
      <div class="sec-title">─ CLASSIC</div>
      <div class="tbtn-group" id="tower-select">
        <button class="tbtn" data-type="cannon"   title="Heavy splash damage">🏰 Cannon (75g)</button>
        <button class="tbtn" data-type="archer"   title="Fast long-range shots">🏹 Archer (50g)</button>
        <button class="tbtn" data-type="spawner"  title="Spawns soldiers">⚔ Barracks (100g)</button>
      </div>

      <!-- Weapon towers -->
      <div class="sec-title">─ WEAPONS</div>
      <div class="tbtn-group" id="tower-select2">
        <button class="tbtn" data-type="prototype"    title="Piercing sniper beam">⚡ Prototype (200g)</button>
        <button class="tbtn" data-type="peacemaker"   title="Minigun — Wave 10+">🔫 Peacemaker (250g)</button>
        <button class="tbtn" data-type="bonecrusher"  title="Stuns enemies">💥 BoneCrusher (175g)</button>
        <button class="tbtn" data-type="poison"       title="Damage over time">☠ Poison (130g)</button>
        <button class="tbtn" data-type="missiles"     title="3 homing missiles">🚀 Missiles (300g)</button>
        <button class="tbtn" data-type="dagger"       title="Highest DPS melee">🗡 Dagger (200g)</button>
      </div>

      <!-- Aura towers -->
      <div class="sec-title">─ AURA / SPECIAL</div>
      <div class="tbtn-group" id="tower-select3">
        <button class="tbtn" data-type="golden"    title="+60% gold from kills">🌟 Golden (300g)</button>
        <button class="tbtn" data-type="blackhole" title="Pulls &amp; crushes enemies">🕳 BlackHole (350g)</button>
        <button class="tbtn" data-type="chrono"    title="Slows all enemies -50%">⏱ Chrono (250g)</button>
        <button class="tbtn" data-type="axe"       title="Buffs nearby towers +35%">🪓 Axe (150g)</button>
      </div>

      <div class="divider"></div>

      <!-- Info panel -->
      <div class="sec-title">INFO</div>
      <div id="info-content">Tap a <span style="color:#88ff88">■</span> to build<br>Tap tower to inspect</div>

      <!-- Action buttons in a 2-column row -->
      <div class="action-row">
        <button id="upgrade-btn"    style="display:none">⬆ Upgrade</button>
        <button id="sell-btn"       style="display:none">💰 Sell</button>
        <button id="move-btn"       style="display:none">🔀 Move</button>
        <button id="cancel-move-btn"style="display:none">❌ Cancel</button>
      </div>

      <div class="divider"></div>

      <!-- Random event box -->
      <div id="event-box" style="display:none">
        <div class="sec-title">⚡ WAVE EVENT</div>
        <div id="event-text"></div>
      </div>

      <button id="start-btn">▶ START WAVE</button>
      <div id="message"></div>
    </div>
  </div>

  <!-- Game over overlay -->
  <div id="overlay" style="display:none">
    <div id="ov-box">
      <h2 id="ov-title"></h2>
      <p  id="ov-body"></p>
      <button id="ov-btn">▶ Play Again</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="entities.js"></script>
  <script src="render.js"></script>
  <script src="game.js"></script>
</body>
</html>
