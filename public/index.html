<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Village Tower Defense</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="container">
    <div id="canvas-wrap">
      <canvas id="game" width="640" height="480"></canvas>
    </div>

    <div id="sidebar">
      <h2 id="game-title">⚔ Village TD</h2>

      <div id="stats">
        <div class="stat"><span class="lbl">Wave</span><span id="wave-num" class="val">0</span></div>
        <div class="stat"><span class="lbl">💰 Gold</span><span id="gold" class="val">150</span></div>
        <div class="stat"><span class="lbl">❤ Lives</span><span id="lives" class="val">10</span></div>
        <div class="stat"><span class="lbl">Score</span><span id="score" class="val">0</span></div>
        <div class="stat"><span class="lbl">Best</span><span id="best" class="val">0</span></div>
      </div>

      <div class="divider"></div>
      <div class="sec-title">─ CLASSIC</div>
      <div id="tower-select">
        <button class="tbtn" data-type="cannon"   title="Heavy splash damage">🏰 Cannon (75g)</button>
        <button class="tbtn" data-type="archer"   title="Fast long-range shots">🏹 Archer (50g)</button>
        <button class="tbtn" data-type="spawner"  title="Spawns soldiers">⚔ Barracks (100g)</button>
      </div>

      <div class="sec-title">─ WEAPONS</div>
      <div id="tower-select2">
        <button class="tbtn" data-type="prototype"   title="Piercing sniper beam">⚡ Prototype (200g)</button>
        <button class="tbtn" data-type="peacemaker"  title="Minigun — Wave 10+">🔫 Peacemaker (250g)</button>
        <button class="tbtn" data-type="bonecrusher" title="Stuns enemies">💥 Bone Crusher (175g)</button>
        <button class="tbtn" data-type="poison"      title="Damage over time">☠ Poison Darts (130g)</button>
        <button class="tbtn" data-type="missiles"    title="3 homing missiles">🚀 Missiles (300g)</button>
        <button class="tbtn" data-type="dagger"      title="Highest DPS melee">🗡 Twins Dagger (200g)</button>
      </div>

      <div class="sec-title">─ AURA / SPECIAL</div>
      <div id="tower-select3">
        <button class="tbtn" data-type="golden"    title="+60% gold from kills">🌟 Golden (300g)</button>
        <button class="tbtn" data-type="blackhole" title="Pulls &amp; crushes enemies">🕳 Black Hole (350g)</button>
        <button class="tbtn" data-type="chrono"    title="Slows all enemies -50%">⏱ Chrono (250g)</button>
        <button class="tbtn" data-type="axe"       title="Buffs nearby towers +35%">🪓 Logging Axe (150g)</button>
      </div>

      <div class="divider"></div>
      <div class="sec-title">INFO</div>
      <div id="info-content">Click a <span style="color:#88ff88">■</span> to build<br>Click tower to inspect/upgrade</div>
      <button id="upgrade-btn" style="display:none">⬆ Upgrade</button>
      <button id="sell-btn"    style="display:none">💰 Sell</button>

      <div class="divider"></div>
      <div id="event-box" style="display:none">
        <div class="sec-title">⚡ WAVE EVENT</div>
        <div id="event-text"></div>
      </div>

      <button id="start-btn">▶ START WAVE</button>
      <div id="message"></div>
    </div>
  </div>

  <div id="overlay" style="display:none">
    <div id="ov-box">
      <h2 id="ov-title"></h2>
      <p  id="ov-body"></p>
      <button id="ov-btn">▶ Play Again</button>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="entities.js"></script>
  <script src="render.js"></script>
  <script src="game.js"></script>
</body>
</html>
